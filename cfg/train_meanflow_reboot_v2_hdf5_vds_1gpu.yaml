  }
  filtered_model = {"_target_": "model.flow.meanflow.MeanFlow"}
  for key, value in model_kwargs.items():
      if key == "network" or key in meanflow_allowed:
          filtered_model[key] = value
  
  base_cfg["model"] = filtered_model
  OmegaConf.save(config=OmegaConf.create(base_cfg), f=cfg_path)
  print(f"[cfg-gen] wrote {cfg_path}")
