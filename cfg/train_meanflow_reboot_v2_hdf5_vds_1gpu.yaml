name: "train-meanflow-reboot-v2-hdf5-vds-1gpu"
description: "DM1 MeanFlow reboot-v2 training from VDS HDF5 dataset (single GPU)"
labels: ["dm1", "train", "meanflow", "reboot_v2", "hdf5", "vds"]
workspace: "default"
project: "dm1_meanflow_training"

resources:
  slots_per_trial: 1
  priority: 5
  resource_pool: "48c96t_512_3090"
  shm_size: 2147483648

environment:
  environment_variables:
    - PYTHONUNBUFFERED=1
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=all
    - MUJOCO_GL=osmesa
    - ACCEPT_EULA=Y
    - PYTORCH_JIT=0
    - TORCH_JIT=0
    - HYDRA_FULL_ERROR=1
    - WANDB_MODE=offline
  image: "harbor.cvgl.lab/library/lzzhao-isaac-lab-from-scratch:5.0.0_0f00ca2_torch2.8.0_250901_3"

bind_mounts:
  - host_path: /workspace/lzzhao/
    container_path: /run/determined/workdir/home/
  - host_path: /UNSAFE_SSD4/
    container_path: /run/determined/workdir/UNSAFE_SSD4/
  - host_path: /datasets/
    container_path: /run/determined/workdir/data/

searcher:
  name: single
  metric: "val_loss"
  smaller_is_better: true

entrypoint: |
  set -eu
  set -x

  DM1_DIR="/run/determined/workdir/home/DM1_ws/dm1-release"
  DATA_HDF5="/run/determined/workdir/UNSAFE_SSD4/HUMAN_DATA/LAFAN1_rollouts_vae_batch/hdf5_reboot_v2_mp8/diffusion_lafan1_rollouts_vae_batch_reboot_v2_57m_vds.hdf5"
  SHARD_DIR="/run/determined/workdir/UNSAFE_SSD4/HUMAN_DATA/LAFAN1_rollouts_vae_batch/hdf5_reboot_v2_mp8/reboot_v2_shards"
  OUTPUT_DIR="/run/determined/workdir/UNSAFE_SSD4/HUMAN_DATA/LAFAN1_rollouts_vae_batch/meanflow_hdf5_vds_1gpu"
  mkdir -p "${OUTPUT_DIR}"

  if [ ! -d "${DM1_DIR}" ]; then
    echo "ERROR: DM1 dir missing: ${DM1_DIR}"
    exit 1
  fi
  if [ ! -f "${DATA_HDF5}" ]; then
    echo "ERROR: dataset missing: ${DATA_HDF5}"
    exit 1
  fi
  if [ ! -d "${SHARD_DIR}" ]; then
    echo "ERROR: shard dir missing (required by VDS): ${SHARD_DIR}"
    exit 1
  fi

  cd "${DM1_DIR}"
  python --version || true
  python -c "import hydra, omegaconf, torch; print('deps ok', torch.__version__)" 2>/dev/null || \
    pip install --prefix=/run/determined/pythonuserbase -q hydra-core==1.3.2 omegaconf==2.3.0
  pip install --prefix=/run/determined/pythonuserbase -q toml setuptools || true
  pip install --prefix=/run/determined/pythonuserbase -q -e . || true

  export PYTHONPATH="/run/determined/pythonuserbase/lib/python3.11/site-packages:${DM1_DIR}:${PYTHONPATH}"
  export REINFLOW_LOG_DIR="${OUTPUT_DIR}"
  export NCCL_DEBUG=INFO

  CFG_DIR="/tmp/dm1_hydra_cfg"
  mkdir -p "${CFG_DIR}"
  CFG_FILE="${CFG_DIR}/meanflow_hdf5_vds_reboot_v2.yaml"
    python - "${CFG_FILE}" <<'PY'
  import importlib
  import inspect
  import sys
  
  from omegaconf import OmegaConf
  
  cfg_path = sys.argv[1]
  
  FALLBACK_HDF5_DATASET_CODE = r"""
  from __future__ import annotations
  
  import bisect
  import glob
  from collections import namedtuple
  from pathlib import Path
  from typing import List, Optional, Union
  
  import h5py
  import numpy as np
  import torch
  from torch.utils.data import Dataset
  
  Batch = namedtuple("Batch", "actions conditions")
  
  
  class BeyondMimicHDF5Dataset(Dataset):
      def __init__(
          self,
          hdf5_files: Union[str, List[str], Path, List[Path]],
          horizon_steps: int,
          cond_steps: int = 1,
          traj_key: str = "traj",
          state_key: str = "state",
          cmd_key: str = "cmd",
          env_key: str = "env",
          style_key: str = "z_style",
          use_style: bool = False,
          device: str = "cpu",
          cache_files: bool = False,
          normalize_traj: bool = False,
          traj_stats_path: Optional[Union[str, Path]] = None,
          traj_stats_eps: float = 1e-6,
          include_v2_fields: bool = False,
          state_hist_key: str = "state_hist",
          cmd_hist_key: str = "cmd_hist",
          state_delta_key: str = "state_delta",
          recovery_key: str = "recovery_flag",
          required_cmd_dim: Optional[int] = None,
          require_v2_fields: bool = False,
          fail_on_fallback: bool = False,
          **kwargs,
      ):
          _ = kwargs
          self.horizon_steps = int(horizon_steps)
          self.cond_steps = max(1, int(cond_steps))
          self.traj_key = traj_key
          self.state_key = state_key
          self.cmd_key = cmd_key
          self.env_key = env_key
          self.style_key = style_key
          self.use_style = bool(use_style)
          self.device = str(device)
          self.cache_files = bool(cache_files)
          self.normalize_traj = bool(normalize_traj)
          self.traj_stats_path = Path(traj_stats_path) if traj_stats_path else None
          self.traj_stats_eps = float(traj_stats_eps)
          self.include_v2_fields = bool(include_v2_fields)
          self.state_hist_key = state_hist_key
          self.cmd_hist_key = cmd_hist_key
          self.state_delta_key = state_delta_key
          self.recovery_key = recovery_key
          self.required_cmd_dim = int(required_cmd_dim) if required_cmd_dim is not None else None
          self.require_v2_fields = bool(require_v2_fields)
          self.fail_on_fallback = bool(fail_on_fallback)
  
          if isinstance(hdf5_files, (str, Path)):
              hdf5_files = [hdf5_files]
          expanded = []
          for path in hdf5_files:
              p = str(path)
              if "*" in p or "?" in p or "[" in p:
                  expanded.extend(glob.glob(p))
              else:
                  expanded.append(p)
          self.files = [Path(p) for p in expanded]
          if not self.files:
              raise FileNotFoundError("No HDF5 files matched for BeyondMimicHDF5Dataset")
  
          self.file_lengths = []
          self._cum_lengths = []
          self._file_cache = {} if self.cache_files else None
  
          self.traj_dim = 0
          self.state_dim = 0
          self.cmd_dim = 0
          self.env_dim = 0
          self.style_dim = 0
          self.state_hist_dim = 0
          self.cmd_hist_dim = 0
          self.state_delta_dim = 0
          self.has_recovery = False
  
          total = 0
          missing_v2 = []
          for fp in self.files:
              if not fp.exists():
                  raise FileNotFoundError(f"HDF5 file not found: {fp}")
              with h5py.File(fp, "r") as f:
                  if self.traj_key not in f or self.state_key not in f:
                      raise KeyError(f"Missing required keys in {fp}: {self.traj_key}, {self.state_key}")
                  n = int(f[self.traj_key].shape[0])
                  total += n
                  self.file_lengths.append(n)
                  self._cum_lengths.append(total)
  
                  self.traj_dim = max(self.traj_dim, int(f[self.traj_key].shape[-1]))
                  self.state_dim = max(self.state_dim, int(f[self.state_key].shape[-1]))
                  if self.cmd_key in f:
                      self.cmd_dim = max(self.cmd_dim, int(f[self.cmd_key].shape[-1]))
                  if self.env_key in f:
                      self.env_dim = max(self.env_dim, int(f[self.env_key].shape[-1]))
                  if self.use_style and self.style_key in f:
                      self.style_dim = max(self.style_dim, int(f[self.style_key].shape[-1]))
  
                  if self.include_v2_fields:
                      if self.state_hist_key in f:
                          self.state_hist_dim = max(self.state_hist_dim, int(f[self.state_hist_key].shape[-1]))
                      else:
                          missing_v2.append((str(fp), self.state_hist_key))
                      if self.cmd_hist_key in f:
                          self.cmd_hist_dim = max(self.cmd_hist_dim, int(f[self.cmd_hist_key].shape[-1]))
                      if self.state_delta_key in f:
                          self.state_delta_dim = max(self.state_delta_dim, int(f[self.state_delta_key].shape[-1]))
                      else:
                          missing_v2.append((str(fp), self.state_delta_key))
                      if self.recovery_key in f:
                          self.has_recovery = True
                      else:
                          missing_v2.append((str(fp), self.recovery_key))
  
          self.num_samples = total
          self.indices = list(range(total))
          self.cache_loaded = True
  
          if self.required_cmd_dim is not None:
              if self.cmd_dim < self.required_cmd_dim:
                  if self.fail_on_fallback:
                      raise ValueError(
                          f"cmd_dim={self.cmd_dim} is smaller than required_cmd_dim={self.required_cmd_dim}"
                      )
                  self.cmd_dim = self.required_cmd_dim
  
          if self.include_v2_fields:
              if self.state_hist_dim <= 0:
                  self.state_hist_dim = self.state_dim
              if self.cmd_hist_dim <= 0:
                  self.cmd_hist_dim = self.cmd_dim
              if self.state_delta_dim <= 0:
                  self.state_delta_dim = self.state_dim
              if self.require_v2_fields and missing_v2:
                  missing_preview = ", ".join([f"{k}@{p}" for p, k in missing_v2[:4]])
                  raise KeyError(f"Missing required reboot-v2 fields: {missing_preview}")
  
          self.cond_dim = self.state_dim + self.cmd_dim + self.env_dim + (self.style_dim if self.use_style else 0)
          self.traj_mean_np = None
          self.traj_std_np = None
          if self.normalize_traj:
              self._init_traj_stats()
  
      def _init_traj_stats(self):
          if self.traj_stats_path and self.traj_stats_path.exists():
              stats = np.load(self.traj_stats_path)
              self.traj_mean_np = np.asarray(stats["mean"], dtype=np.float32).reshape(1, 1, -1)
              self.traj_std_np = np.asarray(stats["std"], dtype=np.float32).reshape(1, 1, -1)
              self.traj_std_np = np.maximum(self.traj_std_np, self.traj_stats_eps)
              return
          with h5py.File(self.files[0], "r") as f:
              sample = np.asarray(f[self.traj_key][: min(2048, len(f[self.traj_key]))], dtype=np.float32)
          self.traj_mean_np = sample.mean(axis=(0, 1), keepdims=True).astype(np.float32)
          self.traj_std_np = sample.std(axis=(0, 1), keepdims=True).astype(np.float32)
          self.traj_std_np = np.maximum(self.traj_std_np, self.traj_stats_eps)
  
      def _map_index(self, global_idx: int):
          file_idx = bisect.bisect_right(self._cum_lengths, global_idx)
          prev = 0 if file_idx == 0 else self._cum_lengths[file_idx - 1]
          return file_idx, global_idx - prev
  
      def _get_file(self, file_idx: int):
          if self._file_cache is None:
              return h5py.File(self.files[file_idx], "r")
          handle = self._file_cache.get(file_idx)
          if handle is None:
              handle = h5py.File(self.files[file_idx], "r")
              self._file_cache[file_idx] = handle
          return handle
  
      @staticmethod
      def _fit_vector(array, dim: int):
          vec = np.asarray(array, dtype=np.float32).reshape(-1)
          if vec.shape[0] > dim:
              return vec[:dim]
          if vec.shape[0] < dim:
              return np.pad(vec, (0, dim - vec.shape[0]), mode="constant")
          return vec
  
      @staticmethod
      def _fit_sequence(array, steps: int, dim: int, default_vec):
          if array is None:
              seq = np.repeat(np.asarray(default_vec, dtype=np.float32).reshape(1, -1), steps, axis=0)
          else:
              seq = np.asarray(array, dtype=np.float32)
              if seq.ndim == 1:
                  seq = seq.reshape(1, -1)
          if seq.shape[0] > steps:
              seq = seq[-steps:]
          elif seq.shape[0] < steps:
              pad = np.zeros((steps - seq.shape[0], seq.shape[1]), dtype=np.float32)
              seq = np.concatenate([pad, seq], axis=0)
          if seq.shape[1] > dim:
              seq = seq[:, :dim]
          elif seq.shape[1] < dim:
              seq = np.pad(seq, ((0, 0), (0, dim - seq.shape[1])), mode="constant")
          return seq.astype(np.float32)
  
      def __len__(self):
          return len(self.indices)
  
      def __getitem__(self, idx: int):
          global_idx = int(self.indices[idx])
          file_idx, local_idx = self._map_index(global_idx)
  
          if self._file_cache is None:
              with h5py.File(self.files[file_idx], "r") as f:
                  return self._read_sample(f, local_idx)
          return self._read_sample(self._get_file(file_idx), local_idx)
  
      def _read_sample(self, f, local_idx: int):
          traj = np.asarray(f[self.traj_key][local_idx], dtype=np.float32)
          if self.normalize_traj and self.traj_mean_np is not None and self.traj_std_np is not None:
              traj = (traj - self.traj_mean_np[0]) / self.traj_std_np[0]
          actions = torch.from_numpy(traj).float().to(self.device)
  
          state = self._fit_vector(f[self.state_key][local_idx], self.state_dim)
          cmd = (
              self._fit_vector(f[self.cmd_key][local_idx], self.cmd_dim)
              if self.cmd_key in f
              else np.zeros(self.cmd_dim, dtype=np.float32)
          )
          env = (
              self._fit_vector(f[self.env_key][local_idx], self.env_dim)
              if self.env_key in f and self.env_dim > 0
              else np.zeros(self.env_dim, dtype=np.float32)
          )
          style = (
              self._fit_vector(f[self.style_key][local_idx], self.style_dim)
              if self.use_style and self.style_key in f and self.style_dim > 0
              else np.zeros(self.style_dim, dtype=np.float32)
          )
  
          if self.include_v2_fields:
              state_hist = f[self.state_hist_key][local_idx] if self.state_hist_key in f else None
              cmd_hist = f[self.cmd_hist_key][local_idx] if self.cmd_hist_key in f else None
              state_delta = f[self.state_delta_key][local_idx] if self.state_delta_key in f else None
              recovery = f[self.recovery_key][local_idx] if self.recovery_key in f else None
  
              state_hist_t = self._fit_sequence(state_hist, self.cond_steps, self.state_hist_dim, state[: self.state_hist_dim])
              cmd_default = cmd[: self.cmd_hist_dim] if self.cmd_hist_dim > 0 else np.zeros(0, dtype=np.float32)
              cmd_hist_t = (
                  self._fit_sequence(cmd_hist, self.cond_steps, self.cmd_hist_dim, cmd_default)
                  if self.cmd_hist_dim > 0
                  else np.zeros((self.cond_steps, 0), dtype=np.float32)
              )
              cond_state = np.concatenate([state_hist_t, cmd_hist_t], axis=1)
  
              state_delta_t = self._fit_sequence(
                  state_delta,
                  self.horizon_steps,
                  self.state_delta_dim,
                  np.zeros(self.state_delta_dim, dtype=np.float32),
              )
              if recovery is None:
                  recovery_t = np.zeros(1, dtype=np.float32)
              else:
                  recovery_t = np.asarray(recovery, dtype=np.float32).reshape(-1)
                  if recovery_t.size == 0:
                      recovery_t = np.zeros(1, dtype=np.float32)
                  recovery_t = recovery_t[:1]
          else:
              cond_vec = np.concatenate([state, cmd, env, style], axis=0)
              cond_state = np.repeat(cond_vec.reshape(1, -1), self.cond_steps, axis=0)
  
          conditions = {
              "state": torch.from_numpy(cond_state).float().to(self.device),
          }
          if self.include_v2_fields:
              conditions["state_hist"] = torch.from_numpy(state_hist_t).float().to(self.device)
              conditions["cmd_hist"] = torch.from_numpy(cmd_hist_t).float().to(self.device)
              conditions["state_delta_target"] = torch.from_numpy(state_delta_t).float().to(self.device)
              conditions["recovery_flag"] = torch.from_numpy(recovery_t).float().to(self.device)
  
          return Batch(actions, conditions)
  
      def __del__(self):
          if self._file_cache:
              for handle in self._file_cache.values():
                  try:
                      handle.close()
                  except Exception:
                      pass
  """
  
  
  def ensure_hdf5_dataset_module():
      try:
          importlib.import_module("agent.dataset.beyondmimic_hdf5_dataset")
          return
      except Exception:
          pass
      module_path = Path("agent/dataset/beyondmimic_hdf5_dataset.py")
      module_path.parent.mkdir(parents=True, exist_ok=True)
      module_path.write_text(FALLBACK_HDF5_DATASET_CODE, encoding="utf-8")
      importlib.invalidate_caches()
  
  
  from pathlib import Path
  
  ensure_hdf5_dataset_module()
  
  base_cfg = {
      "env_suite": "beyondmimic",
      "env": "humanoid",
      "horizon_steps": 16,
      "num_joints": 29,
      "traj_dim": "${eval:'${num_joints}'}",
      "dim_state": 64,
      "dim_cmd": 58,
      "dim_env": 0,
      "dim_style": 0,
      "use_style": False,
      "cond_dim": "${eval:'${dim_state} + ${dim_cmd} + ${dim_env} + ${dim_style}'}",
      "cond_steps": 3,
      "dim_state_delta": "${dim_state}",
      "_target_": "agent.pretrain.train_meanflow_humanoid.TrainMeanFlowHumanoidAgent",
      "name": "beyondmimic_pre_meanflow_hdf5_vds_reboot_v2_h${horizon_steps}_j${num_joints}",
      "logdir": "${oc.env:REINFLOW_LOG_DIR}/beyondmimic/pretrain/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}",
      "train_dataset_paths": [
          "/UNSAFE_SSD4/HUMAN_DATA/LAFAN1_rollouts_vae_batch/hdf5_reboot_v2_mp8/diffusion_lafan1_rollouts_vae_batch_reboot_v2_57m_vds.hdf5"
      ],
      "flow_ratio": 0.5,
      "ratio_r_not_equal_t": 0.5,
      "gamma": 0.5,
      "c": 1e-3,
      "adaptive_p": 1.0,
      "time_mu": -0.4,
      "time_sigma": 1.0,
      "batch_size": 64,
      "seed": 42,
      "device": "cuda:0",
      "test_in_mujoco": False,
      "max_n_episodes": -1,
      "wandb": {
          "entity": "${oc.env:REINFLOW_WANDB_ENTITY,offline}",
          "project": "DM1-beyondmimic-pretrain",
          "run": "${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}_meanflow",
          "offline_mode": True,
      },
      "train": {
          "n_epochs": 1000,
          "batch_size": "${batch_size}",
          "learning_rate": 1e-4,
          "weight_decay": 1e-6,
          "lr_scheduler": {
              "first_cycle_steps": 1000,
              "warmup_steps": 50,
              "min_lr": 1e-5,
          },
          "epoch_start_ema": 20,
          "update_ema_freq": 10,
          "save_model_freq": 25,
          "log_freq": 25,
          "step_log_freq": 200,
          "train_split": 0.9,
          "val_freq": 25,
          "distributed_backend": "nccl",
          "distributed_url": "env://",
          "ddp_find_unused_parameters": False,
          "max_steps_per_epoch": None,
      },
      "state_consistency_weight": 1.0,
      "recovery_weight": 0.25,
      "ema": {"decay": 0.995},
      "train_dataset": {
          "_target_": "agent.dataset.beyondmimic_hdf5_dataset.BeyondMimicHDF5Dataset",
          "hdf5_files": "${train_dataset_paths}",
          "horizon_steps": "${horizon_steps}",
          "cond_steps": "${cond_steps}",
          "traj_key": "action",
          "state_key": "state",
          "cmd_key": "cmd",
          "env_key": "env",
          "style_key": "z_style",
          "use_style": "${use_style}",
          "device": "cpu",
          "cache_files": True,
          "normalize_traj": False,
          "traj_stats_path": None,
          "traj_stats_eps": 1e-6,
          "traj_stats_chunk_size": 2048,
          "include_v2_fields": True,
          "state_hist_key": "state_hist",
          "cmd_hist_key": "cmd_hist",
          "state_delta_key": "state_delta",
          "recovery_key": "recovery_flag",
          "required_cmd_dim": "${dim_cmd}",
          "require_v2_fields": True,
          "fail_on_fallback": True,
      },
      "test_denoising_steps": 5,
  }
  
  network_candidates = [
      (
          "model.flow.sit_meanflow",
          "MeanFlowSiT1D",
          {
              "horizon_steps": "${horizon_steps}",
              "action_dim": "${traj_dim}",
              "cond_dim": "${cond_dim}",
              "cond_steps": "${cond_steps}",
              "hidden_size": 512,
              "depth": 8,
              "num_heads": 8,
              "mlp_ratio": 4.0,
              "pos_embed": "sincos",
              "dropout": 0.0,
              "time_freq_dim": 256,
              "predict_state_delta": True,
              "state_delta_dim": "${dim_state_delta}",
          },
      ),
      (
          "model.flow.mlp_meanflow",
          "MeanFlowMLP",
          {
              "horizon_steps": "${horizon_steps}",
              "action_dim": "${traj_dim}",
              "cond_dim": "${eval:'${cond_dim} * ${cond_steps}'}",
              "time_dim": 16,
              "r_embedding_dim": 16,
              "mlp_dims": [512, 512, 512],
              "activation_type": "Mish",
              "out_activation_type": "Identity",
              "use_layernorm": False,
              "residual_style": True,
              "cond_mlp_dims": [256, 256],
          },
      ),
  ]
  
  network_target = None
  network_kwargs = None
  network_uses_flattened_cond = False
  for module_name, cls_name, kwargs in network_candidates:
      try:
          cls = getattr(importlib.import_module(module_name), cls_name)
      except Exception:
          continue
      allowed = set(inspect.signature(cls.__init__).parameters.keys())
      network_target = f"{module_name}.{cls_name}"
      network_kwargs = {k: v for k, v in kwargs.items() if k in allowed}
      network_uses_flattened_cond = cls_name == "MeanFlowMLP"
      break

  if network_target is None:
      raise RuntimeError("No compatible MeanFlow network class found")
  
  meanflow_cls = getattr(importlib.import_module("model.flow.meanflow"), "MeanFlow")
  meanflow_allowed = set(inspect.signature(meanflow_cls.__init__).parameters.keys())
  obs_dim_value = (
      "${eval:'${cond_dim} * ${cond_steps}'}"
      if network_uses_flattened_cond
      else "${cond_dim}"
  )
  model_kwargs = {
      "network": {"_target_": network_target, **network_kwargs},
      "device": "${device}",
      "horizon_steps": "${horizon_steps}",
      "action_dim": "${traj_dim}",
      "act_min": -7,
      "act_max": 7,
      "obs_dim": obs_dim_value,
      "max_denoising_steps": 5,
      "seed": "${seed}",
      "flow_ratio": "${flow_ratio}",
      "ratio_r_not_equal_t": "${ratio_r_not_equal_t}",
      "gamma": "${gamma}",
      "c": "${c}",
